<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="chat-container">
    <header>🤖 AI Chat</header>
    
    <div id="chat-messages"></div>
    
    <form id="chat-form">
      <select id="model">
        <option value="openrouter/free">openrouter/free</option>
        <option value="qwen/qwen3-coder:free">Qwen3-coder</option>
        <option value="nvidia/nemotron-3-super-120b-a12b:free">Nemotron3super</option>
        <option value="openai/gpt-oss-120b:free">gpt-oss-120b</option>
        <option value="openai/gpt-oss-20b:free">gpt-oss-20b</option>
        <option value="z-ai/glm-4.5-air:free">glm4.5air</option>
        <option value="google/gemma-4-31b-it:free">gemma-4-31b</option>
        <option value="google/gemma-4-26b-a4b-it:free">gemma-4-26b-a4b</option>
        <option value="nvidia/nemotron-3-nano-30b-a3b:free">nemotron-3-nano-30b</option>
      </select>
      <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="/script.js"></script>
</body>
</html>
